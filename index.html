<!DOCTYPE html>

<html>
		<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="서글러의 노래책">
    <title>서글러의 노래책</title>

    <!-- 1. 폰트 파일은 기존대로 유지 -->
    <link href="styles/fonts.css" rel="stylesheet" type="text/css">

    <!-- 2. 외부 CSS를 못 읽는 스푼 앱 웹뷰를 위해 HTML 내부에 직접 디자인 주입 -->
    <style>
        /* 기본 변수 선언 (parameters.css 역할) */
        :root {
            --body-background: #010101;
            --font-sans: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        }

        /* 기본 바디 설정 */
        body {
            background-color: var(--body-background) !important;
            color: #ffffff !important;
            font-family: var(--font-sans);
            margin: 0;
            padding: 0;
        }

        /* 텍스트 및 제목 강제 흰색 지정 */
        formatted-string, .song-name, .artist-name, .random-song-name, .random-artist-name {
            color: #ffffff !important;
            display: inline-block !important;
        }

        /* 노래 카드 레이아웃 강제 활성화 (정상 화면의 회색 박스 복구) */
        .song-div, .random-song {
            background-color: #242424e6 !important;
            border-radius: 12px !important;
            padding: 12px !important;
            margin: 10px !important;
            display: flex !important;
            align-items: center !important;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* 앨범 이미지와 글씨 간격 확보 */
        .album-cover-div {
            flex-shrink: 0 !important;
            margin-right: 15px !important;
            width: 80px !important; /* 모바일 기준 적정 크기 고정 */
            height: 80px !important;
        }

        /* 정보 텍스트 영역 */
        .info-div {
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
        }
    </style>

    <!-- 3. 혹시 모를 일반 브라우저 대응을 위해 기존 CSS 링크도 그대로 둡니다 (하이브리드 백업) -->
    <link href="styles/parameters.css" rel="stylesheet" type="text/css">
    <link href="styles/style.css" rel="stylesheet" type="text/css">
	</head>

	<body>
		<div class="base">
			<!----------------------------------- 본문 -->
			<div class="main-content" id="mainContent">
			
				<!----------------------------------- 랜덤 -->
				<div class="random-list">
					<!----------------------------------- 헤더 -->
					<div class="header-gruop">
						<h2 class="radom-list-header">
							<formatted-string class="random-list-title">
								랜덤 리스트
							</formatted-string>
						</h2>
					</div>
					<!----------------------------------- 본문 -->
					<div class="content-group">
						<random class="random-music-list" id="RND">
						</random>
					</div>
				</div>

				<!----------------------------------- 모든 노래, 검색 결과 -->
				<div class="main-list">
					<!----------------------------------- 헤더 -->
					<div class="header-gruop">
						<div class="title-group">
							<!----------------------------------- 헤더 텍스트 -->
							<h2 class="main-list-header">
								<formatted-string class="main-list-title">
									모든 노래
								</formatted-string>
							</h2>
							<!----------------------------------- 검색 영역 -->
							<div class="search-box">
								<div class="search-icon">
									<i class="fa-solid fa-magnifying-glass"></i>
								</div>
								<input type="text" id="inputsearch" onkeydown="searchEnter();" oninput="searchUpdate();" placeholder="Search" class="search-text">
							</div>
						</div>	

						<!----------------------------------- 헤더 분류 선택자 -->
						<div class="selector">
							<!----------------------------------- 대분류 선택자 -->
							
							<category>
							</category>
							<!----------------------------------- 정렬 선택자 -->
							<div class="sort-select">
								<button type="button" class="sort-button clickable" id="bySinger" onclick="sortSinger();" >
									<formatted-string class="sort-text">
										가수명순
										<i class="fa-solid fa-arrow-down-short-wide"></i>
									</formatted-string>
								</button>
								<button type="button" class="sort-button clickable" id="bySong" onclick="sortSong();">
									<formatted-string class="sort-text">
										곡명순
										<i class="fa-solid fa-arrow-down-short-wide"></i>
									</formatted-string>
								</button>
								<button type="button" class="sort-button clickable button-selected" id="byAdd" onclick="sortAdded();">
									<formatted-string class="sort-text">
										등록순
										<i class="fa-solid fa-arrow-down-short-wide"></i>
									</formatted-string>
								</button>
							</div>
						</div>
						
						<!----------------------------------- 헤더 분류 선택자 -->
						<div class="selector">
							
							<!----------------------------------- 장르 목록 -->
							<genre class="genre-list">
							</genre>
						</div>	
					</div>
					<!----------------------------------- End - 헤더 -->

					<!----------------------------------- 노래 목록 -->
					<section class="music-list" id="musicList">
					</section>

				</div>
				<!----------------------------------- End - 모든 노래, 검색 결과 -->

			</div>
			<div id="toast"></div>

			<!----------------------------------- 좌측 사이드바 -->
			<div class="sidebar-wrapper" id="sidebar-wrapper-id">
				<div class="sidebar" id="sidebar-id">
					<!--
					<button id="button" class="cross-icon">
						<i class="fa-solid fa-xmark"></i>
					</button>
					-->

					<!----------------------------------- 사이드바 상단 -->
					<div class="sidebar-header">
						<h1 class="sidebar-header-content">
							<formatted-string class="sidebar-header-text">
								서글러의 노래책
							</formatted-string>
						</h1>
					</div>
					<div class="sidebar-img">
						<img id="profile-pic" src="1000106883.png" alt="프로필 이미지">
					</div>

					<!----------------------------------- 설명 -->
					<div class="introduction">
						<formatted-string class="introduction-text">
							서글러의 노래방송 입니다.
							</formatted-string>
						<ul>
							</li>
							<li>
							<formatted-string class="introduction-text">
								노래신청은 노래책의 리스트에서 선택해서 자유롭게 신청해주세요
								</formatted-string>
							</li>
							<li>
								<formatted-string class="introduction-text">
									스푼 , 좋아요 는 서글러를 춤추게 합니다.
								</formatted-string>
							</li>
						</ul>
					</div>
				</div>
			</div>


			<!----------------------------------- 모바일 상단바 -->
			<div class="nav">
				<div class="nav-head">
					<h1>
						<formatted-string class="sidebar-header-text">
							서글러의 노래책
						</formatted-string>
					</h1>
				</div>
				<button type="button" class="menu-button" id="openMenu">
					<i class="fa-solid fa-bars" id="menu-icon"></i>
				</button>
			</div>

			<script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
			<script src="scripts/google-sheet.js"></script>
			<script src="scripts/func.js"></script>
		</div>
	</body>
</html>
